  <!-- JSON-LD Structured Data: FAQPage (triggers FAQ rich results in Google) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is an ATS score and why does it matter?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "An ATS (Applicant Tracking System) score measures how well your resume is parsed and ranked by automated hiring software used by employers. A higher ATS score means your resume is more likely to reach a human recruiter. JobMatcher AI checks your ATS score instantly for free."
        }
      },
      {
        "@type": "Question",
        "name": "How does JobMatcher AI analyze my resume?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "JobMatcher AI uses Google Gemini AI to parse your resume, check it against ATS criteria, match it with a job description, identify skill gaps, suggest a learning path, and generate personalized interview questions — all within 30 seconds."
        }
      },
      {
        "@type": "Question",
        "name": "Is JobMatcher AI free to use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, JobMatcher AI is completely free. Simply upload your resume (PDF or TXT), optionally paste a job description, and click Analyze to get your full career report at no cost."
        }
      },
      {
        "@type": "Question",
        "name": "What file formats does JobMatcher AI support?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "JobMatcher AI supports PDF and TXT resume files up to 5 MB in size."
        }
      },
      {
        "@type": "Question",
        "name": "Is my resume data safe and private?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Your resume is processed securely and is never shared with third parties or advertisers. Resume text is only used to generate your personal career report."
        }
      }
    ]
  }
